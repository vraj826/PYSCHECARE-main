name: Stale Issue Closer Bot

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  stale:
    name: Mark and Close Stale Issues & PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          # --- Timing ---
          days-before-stale: 14   # Mark stale after 14 days of no activity
          days-before-close: 7    # Close 7 days after being marked stale

          # --- Labels ---
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

          # --- Messages for Issues ---
          stale-issue-message: >
            👋 This issue has been automatically marked as **stale** because it has had
            no activity for **14 days**.

            If this issue is still relevant, please:
            - Leave a comment with an update
            - Remove the `stale` label

            Otherwise, it will be **automatically closed in 7 days**.
            Thank you for your contributions! 💙

          close-issue-message: >
            🔒 This issue has been **automatically closed** due to inactivity (no activity
            for 21 days total).

            If you believe this issue is still valid, feel free to reopen it with
            a fresh update or additional context. Thank you!

          # --- Messages for Pull Requests ---
          stale-pr-message: >
            👋 This pull request has been automatically marked as **stale** because it has
            had no activity for **14 days**.

            If this PR is still in progress, please:
            - Push new commits or leave a comment
            - Remove the `stale` label

            Otherwise, it will be **automatically closed in 7 days**.
            Thank you for your contributions! 💙

          close-pr-message: >
            🔒 This pull request has been **automatically closed** due to inactivity
            (no activity for 21 days total).

            If you'd like to continue this work, feel free to reopen the PR or
            submit a new one. Thank you!

          # --- Exemptions ---
          # Issues/PRs with these labels will never be marked stale
          exempt-issue-labels: 'pinned,security,in-progress,help wanted'
          exempt-pr-labels: 'pinned,security,in-progress,work-in-progress,wip'

          # Do not mark issues/PRs as stale if they have a milestone set
          exempt-all-milestones: true

          # Limit operations per run to avoid hitting API rate limits
          operations-per-run: 100
