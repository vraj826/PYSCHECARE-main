name: 🏆 GSSoC Score Calculator

on:
  pull_request_target:
    types: [labeled, unlabeled, opened, reopened, synchronize]

jobs:
  calculate-score:
    name: Calculate & Post GSSoC Score
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Calculate Score and Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            // ================================================================
            //  PSYCHECARE — GSSoC PR SCORE CALCULATOR
            //
            //  Formula:
            //    Score = 50 (base) + (difficulty_pts × quality_mult) + type_pts
            //
            //  Difficulty (required, pick ONE):
            //    level:beginner      →  20 pts
            //    level:intermediate  →  35 pts
            //    level:advanced      →  55 pts
            //    level:critical      →  80 pts
            //
            //  Quality multiplier (optional, applied on difficulty only):
            //    quality:clean       → ×1.0  (no bonus)
            //    quality:exceptional → ×1.5
            //
            //  Type points (optional, stackable):
            //    type:bug            → +10 pts
            //    type:feature        → +10 pts
            //    type:testing        → +10 pts
            //    type:refactor       → +10 pts
            //    type:design         → +10 pts
            //    type:security       → +20 pts
            //    type:docs           → + 5 pts
            //    type:devops         → +15 pts
            //    type:performance    → +15 pts
            //    type:accessibility  → +15 pts  (counts as "other")
            //
            //  Base: +50 pts per merged PR (requires gssoc:approved)
            //
            //  Max practical score: ~270 pts
            // ================================================================

            const PR_NUMBER  = context.payload.pull_request.number;
            const OWNER      = context.repo.owner;
            const REPO       = context.repo.repo;
            const BOT_MARKER = '<!-- gssoc-score-calculator-v2 -->';

            // ── STEP 1: Fetch current PR labels ───────────────────────────
            const prResp = await github.rest.pulls.get({
              owner: OWNER, repo: REPO, pull_number: PR_NUMBER
            });
            const labels = prResp.data.labels.map(l => l.name);

            // ── STEP 2: Detect mentor:username labels ─────────────────────
            const mentorLabels = labels.filter(l => l.startsWith('mentor:'));
            const mentors      = mentorLabels.map(l => `@${l.replace('mentor:', '')}`);

            // ── STEP 3: Base points ───────────────────────────────────────
            const isApproved  = labels.includes('gssoc:approved');
            const BASE_POINTS = isApproved ? 50 : 0;

            // ── STEP 4: Difficulty points (pick ONE) ──────────────────────
            const DIFFICULTY_MAP = {
              'level:beginner':      20,
              'level:intermediate':  35,
              'level:advanced':      55,
              'level:critical':      80
            };
            const diffLabels = labels.filter(l => l in DIFFICULTY_MAP);
            const diffLabel  = diffLabels[0] || null;
            const diffPts    = diffLabel ? DIFFICULTY_MAP[diffLabel] : 0;

            // ── STEP 5: Quality multiplier (on difficulty only) ───────────
            const QUALITY_MAP = {
              'quality:clean':       1.0,
              'quality:exceptional': 1.5
            };
            const qualLabel = labels.find(l => l in QUALITY_MAP) || null;
            const qualMult  = qualLabel ? QUALITY_MAP[qualLabel] : 1.0;
            const diffAfterQuality = Math.round(diffPts * qualMult * 10) / 10; // 1 decimal

            // ── STEP 6: Type points (stackable, individual values) ────────
            const TYPE_POINTS_MAP = {
              'type:bug':           10,
              'type:feature':       10,
              'type:testing':       10,
              'type:refactor':      10,
              'type:design':        10,
              'type:security':      20,
              'type:docs':           5,
              'type:devops':        15,
              'type:performance':   15,
              'type:accessibility': 15
            };
            const typeLabels   = labels.filter(l => l in TYPE_POINTS_MAP);
            const TYPE_TOTAL   = typeLabels.reduce((sum, l) => sum + TYPE_POINTS_MAP[l], 0);

            // ── STEP 7: Total score ───────────────────────────────────────
            const TOTAL_SCORE = BASE_POINTS + diffAfterQuality + TYPE_TOTAL;

            // ── STEP 8: Validation flags ──────────────────────────────────
            const missingApproved    = !isApproved;
            const missingDifficulty  = diffLabels.length === 0;
            const multipleDifficulty = diffLabels.length > 1;

            // ── STEP 9: Build comment ─────────────────────────────────────
            let warningBlock = '';
            if (missingApproved)
              warningBlock += `> ⛔ **\`gssoc:approved\` is missing** — this PR will **not count** toward the leaderboard until a maintainer adds it.\n\n`;
            if (missingDifficulty)
              warningBlock += `> ⚠️ **No \`level:*\` difficulty label found** — this is **required**. Ask a maintainer to assign one.\n\n`;
            if (multipleDifficulty)
              warningBlock += `> ⚠️ **Multiple difficulty labels found** (\`${diffLabels.join('`, `')}\`) — only **one** should be applied.\n\n`;

            // Build type rows
            const allTypeKeys = Object.keys(TYPE_POINTS_MAP);
            const typeTableRows = allTypeKeys.map(t => {
              const applied = typeLabels.includes(t);
              const pts     = TYPE_POINTS_MAP[t];
              return `| ${applied ? '✅' : '⬜'} | \`${t}\` | ${applied ? `**+${pts} pts**` : `~~+${pts} pts~~`} |`;
            }).join('\n');

            // Formula line
            const formulaParts = [];
            formulaParts.push(`${BASE_POINTS} (base)`);
            formulaParts.push(`${diffAfterQuality} (${diffLabel || '?'} × ${qualMult})`);
            if (TYPE_TOTAL > 0) formulaParts.push(`${TYPE_TOTAL} (types)`);

            // Score emoji
            const scoreEmoji = TOTAL_SCORE >= 200 ? '🏆' :
                               TOTAL_SCORE >= 140 ? '🥇' :
                               TOTAL_SCORE >= 80  ? '🥈' : '🥉';

            const mentorLine = mentors.length > 0
              ? `\n---\n\n👨‍🏫 **Reviewed by:** ${mentors.join(', ')}`
              : '';

            const comment = `${BOT_MARKER}
## ${scoreEmoji} GSSoC Score Summary — PR #${PR_NUMBER}

${warningBlock}---

### 📊 Score Breakdown

**Base**
| Status | Component | Points |
|--------|-----------|--------|
| ${isApproved ? '✅' : '⛔'} | \`gssoc:approved\` | **${BASE_POINTS} pts** |

**Difficulty** *(required — pick one)*
| Status | Label | Base Pts | After Quality |
|--------|-------|----------|---------------|
| ${diffLabel === 'level:beginner'     ? '✅' : '⬜'} | \`level:beginner\`     | 20 pts | — |
| ${diffLabel === 'level:intermediate' ? '✅' : '⬜'} | \`level:intermediate\` | 35 pts | — |
| ${diffLabel === 'level:advanced'     ? '✅' : '⬜'} | \`level:advanced\`     | 55 pts | — |
| ${diffLabel === 'level:critical'     ? '✅' : '⬜'} | \`level:critical\`     | 80 pts | — |

**Quality** *(optional — applied on difficulty only)*
| Status | Label | Multiplier | Difficulty After |
|--------|-------|------------|-----------------|
| ${qualLabel === 'quality:clean'       ? '✅' : '⬜'} | \`quality:clean\`       | ×1.0 | ${Math.round(diffPts * 1.0 * 10)/10} pts |
| ${qualLabel === 'quality:exceptional' ? '✅' : '⬜'} | \`quality:exceptional\` | ×1.5 | ${Math.round(diffPts * 1.5 * 10)/10} pts |

> Applied: **${diffPts} × ${qualMult} = ${diffAfterQuality} pts**

**Contribution Type** *(stackable)*
| | Label | Points |
|---|-------|--------|
${typeTableRows}

> Type total: **+${TYPE_TOTAL} pts**

---

### 🧮 Formula

\`\`\`
Score = ${BASE_POINTS} + ${diffAfterQuality} + ${TYPE_TOTAL}
      = ${TOTAL_SCORE} pts
\`\`\`

> ${formulaParts.join(' + ')}

## 💯 Total Score: **${TOTAL_SCORE} pts**
${mentorLine}

---
<sub>🤖 Auto-updated by GSSoC Score Bot on every label change · Max practical score: ~270 pts</sub>`;

            // ── STEP 10: Update existing comment or create new one ─────────
            const comments = await github.rest.issues.listComments({
              owner: OWNER, repo: REPO, issue_number: PR_NUMBER, per_page: 100
            });
            const existing = comments.data.find(c => c.body.includes(BOT_MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: OWNER, repo: REPO,
                comment_id: existing.id,
                body: comment
              });
              console.log(`✅ Updated score comment (ID: ${existing.id}) — Total: ${TOTAL_SCORE} pts`);
            } else {
              await github.rest.issues.createComment({
                owner: OWNER, repo: REPO,
                issue_number: PR_NUMBER,
                body: comment
              });
              console.log(`✅ Created score comment — Total: ${TOTAL_SCORE} pts`);
            }
