version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.php
    ports:
      - "80:80"
    environment:
      - CHAT_API_SECRET=super_secret_key
      - ALLOWED_ORIGIN=http://localhost
    depends_on:
      - backend

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ALLOWED_ORIGIN=http://localhost
      - CHAT_API_SECRET=super_secret_key
